[platformio]
; Menentukan direktori source kode berada di folder root (bersama dengan file .ino)
; Ini mempertahankan kompatibilitas dengan Arduino IDE
src_dir = .
include_dir = .

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

; Kecepatan baud rate Serial Monitor sesuai firmware (115200)
monitor_speed = 115200

; Upload options
upload_speed = 921600

; Dependensi library yang digunakan oleh project ini
lib_deps =
   adafruit/RTClib
   dfrobot/DFRobotDFPlayerMini
   adafruit/Adafruit GFX Library
   adafruit/Adafruit ST7735 and ST7789 Library
   plerup/EspSoftwareSerial
   bblanchon/ArduinoJson



; === Hardware Memory Configuration (ESP32-S3 N16R8) ===
; Hardware fisik board ini berjalan di DIO (konfirmasi dari ROM: "mode:DIO")
; dio_opi = Flash DIO + PSRAM Octal → sesuai hardware aktual
board_build.arduino.memory_type = dio_opi
board_build.flash_mode = dio
board_build.f_flash = 80000000L   ; dio_80m bootloader tersedia, pakai 80MHz
board_build.f_cpu = 240000000L

; LittleFS filesystem & partition scheme
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv  ; Perbesar ruang app + LittleFS

; Build flags
build_flags =
   ; -DBOARD_HAS_PSRAM          ; sudah ada di board JSON
   -DARDUINO_USB_CDC_ON_BOOT=0 ; sudah ada di board JSON
   ; -DARDUINO_USB_MODE=1        ; sudah ada di board JSON
   -DCORE_DEBUG_LEVEL=1   ; ← TURUNKAN! Level 5 menyebabkan crash BLE (race condition di Serial.print)
   -DDFPLAYER_ENABLED=1   ; Ubah ke 1 saat hardware DFPlayer sudah terhubung

; Filter serial untuk decode exception
monitor_filters = esp32_exception_decoder, time
